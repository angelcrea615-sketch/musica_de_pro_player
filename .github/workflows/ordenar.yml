name: Ordenar Musica
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Generar JSON con Nombres Completos
        run: |
          echo "[" > musica.json
          # Obtenemos fecha y nombre completo sin importar los espacios
          git ls-files -z *.mp3 | xargs -0 -n1 -I{} git log -1 --format="%at {}" {} | sort -rn | while read -r line; do
            timestamp=$(echo "$line" | awk '{print $1}')
            filename=$(echo "$line" | cut -d' ' -f2-)
            if [ -n "$filename" ]; then
              # Usamos comillas dobles para envolver el nombre en el JSON
              echo "  {\"name\":\"$filename\", \"url\":\"https://raw.githubusercontent.com/angelcrea615-sketch/musica_de_pro_player/main/$filename\"}," >> musica.json
            fi
          done
          sed -i '$ s/,$//' musica.json
          echo "]" >> musica.json

      - name: Guardar Cambios
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Robot de Orden Profesional"
          git add musica.json
          git commit -m "Lista actualizada con nombres completos" || exit 0
          git push
