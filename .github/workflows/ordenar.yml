name: Ordenar Musica
on:
  push:
    paths:
      - 'songs/**' # Solo se activa si subes algo a la carpeta "songs"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Crear Lista
        run: |
          # Este comando mira las fechas de subida y crea un archivo llamado musica.json
          git ls-files -z songs/*.mp3 | xargs -0 -n1 -I{} git log -1 --format="%at {}" {} | sort -rn | awk '{print "{\"name\":\"" substr($2, 7) "\", \"url\":\"https://raw.githubusercontent.com/TU_USUARIO/TU_REPO/main/" $2 "\"},"}' > lista_temporal.json
          echo "[" > musica.json
          cat lista_temporal.json | sed '$ s/,$//' >> musica.json
          echo "]" >> musica.json
      - name: Guardar en GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Robot de Orden"
          git add musica.json
          git commit -m "Lista actualizada" || exit 0
          git push
